    <!-- Strip any leftover googtrans cookies from earlier translate-widget attempts.
         Google Translate rewrites text nodes that React then tries to reconcile,
         which crashes the SPA into a blank page on mobile. We translate via the
         in-app dictionary instead. -->
    <script type="text/javascript">
      (function clearLegacyTranslateCookies() {
        try {
          var host = location.hostname;
          var parts = host.split('.');
          var paths = ['/', ''];
          var domains = ['', host, '.' + host];
          if (parts.length > 1) domains.push('.' + parts.slice(-2).join('.'));
          for (var i = 0; i < domains.length; i++) {
            for (var j = 0; j < paths.length; j++) {
              var d = domains[i] ? ';domain=' + domains[i] : '';
              var p = paths[j] ? ';path=' + paths[j] : '';
              document.cookie = 'googtrans=;expires=Thu, 01 Jan 1970 00:00:00 GMT' + p + d;
            }
          }
        } catch (e) {}
      })();
    </script>
