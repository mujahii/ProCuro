    <!-- Google Translate — loaded async only when a non-English googtrans cookie is set.
         This prevents the script from blocking page load on mobile networks. -->
    <script type="text/javascript">
      window.googleTranslateElementInit = function () {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,de',
          autoDisplay: false,
        }, 'google_translate_element');
      };
      (function loadGoogleTranslateIfNeeded() {
        try {
          var cookie = document.cookie || '';
          var match = cookie.match(/googtrans=([^;]+)/);
          var target = match ? decodeURIComponent(match[1]) : '';
          // Format is "/src/dest" — only load the widget if destination is not English
          var needsTranslate = /\/(?!en$)[a-z-]+$/i.test(target);
          if (!needsTranslate) return;
          var s = document.createElement('script');
          s.async = true;
          s.defer = true;
          s.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
          document.head.appendChild(s);
        } catch (e) { /* fail silently — site still works without translation */ }
      })();
    </script>
  </head>
  <body>
    <div id="google_translate_element" style="display:none;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
