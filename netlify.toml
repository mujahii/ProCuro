[build]
  command = "npm run install:all && npm run build"
  publish = "client/dist"
  environment = { NODE_VERSION = "20" }

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000

# AI function routes — must come BEFORE the SPA catch-all
[[redirects]]
  from = "/api/ai/chat"
  to = "/.netlify/functions/ai-chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/analytics-summary"
  to = "/.netlify/functions/ai-analytics-summary"
  status = 200
  force = true

# Rewrite all non-file requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
